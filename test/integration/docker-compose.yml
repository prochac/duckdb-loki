# A single-node Grafana Loki for the integration test (DESIGN.md §8). The image's built-in
# local config (boltdb-shipper + filesystem) is enough: the test seeds only recent entries,
# so nothing hits ingest age limits or store retention. Port 3100 is mapped to the host.
services:
  loki:
    image: grafana/loki:2.9.0
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
